name: Deploy to Server (Secure)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 使用只读的 deploy key，而不是完整的 SSH 密钥
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          # 使用专门的部署密钥，而不是用户主密钥
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # 限制命令执行
          script_stop: true
          # 设置超时
          command_timeout: 5m
          # 执行部署脚本
          script: |
            set -e
            cd /var/www/cloud-vibe
            git pull origin main
            npm ci --production=false
            npm run build
            pm2 restart cloud-vibe || pm2 start ecosystem.config.js
